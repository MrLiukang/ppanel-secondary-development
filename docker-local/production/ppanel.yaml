Host: 0.0.0.0
Port: 8080
Debug: false
AppLocation: Asia/Shanghai

Transport:
  Driver: hertz

TLS:
  Enable: false
  CertFile: ""
  KeyFile: ""

JwtAuth:
  AccessSecret: __JWT_SECRET__
  AccessExpire: 604800

Logger:
  ServiceName: PPanel
  Mode: console
  Encoding: plain
  TimeFormat: "2006-01-02 15:04:05.000"
  Path: logs
  Level: info
  MaxContentLength: 0
  Compress: false
  Stat: true
  KeepDays: 14
  StackCooldownMillis: 100
  MaxBackups: 7
  MaxSize: 100
  Rotation: daily
  FileTimeFormat: 2006-01-02T15:04:05.000Z07:00

Database:
  Type: mysql
  Addr: mysql:3306
  Username: ppanel
  Password: __DB_PASSWORD__
  Dbname: ppanel
  Config: charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai
  MaxIdleConns: 10
  MaxOpenConns: 50
  SlowThreshold: 1000

Redis:
  Host: redis:6379
  Pass: ""
  DB: 0

Administrator:
  Email: admin@xexa1990.top
  Password: __ADMIN_PASSWORD__

Node:
  NodeSecret: __NODE_SECRET__
  NodePullInterval: 60
  NodePushInterval: 60
  TrafficReportThreshold: 0
