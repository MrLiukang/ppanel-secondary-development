Host: 0.0.0.0
Port: 8080
Debug: true
AppLocation: Asia/Shanghai

Transport:
  Driver: hertz

TLS:
  Enable: false
  CertFile: ""
  KeyFile: ""

JwtAuth:
  AccessSecret: local-docker-development-secret-change-me
  AccessExpire: 604800

Logger:
  ServiceName: ApiService
  Mode: console
  Encoding: plain
  TimeFormat: "2006-01-02 15:04:05.000"
  Path: logs
  Level: debug
  MaxContentLength: 0
  Compress: false
  Stat: true
  KeepDays: 0
  StackCooldownMillis: 100
  MaxBackups: 0
  MaxSize: 0
  Rotation: daily
  FileTimeFormat: 2006-01-02T15:04:05.000Z07:00

Database:
  Type: mysql
  Addr: mysql:3306
  Username: ppanel
  Password: ppanel
  Dbname: ppanel
  Config: charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai
  MaxIdleConns: 10
  MaxOpenConns: 10
  SlowThreshold: 1000

Redis:
  Host: redis:6379
  Pass: ""
  DB: 0

Administrator:
  Email: admin@ppanel.dev
  Password: password

